name: 6-Hourly Reel Autopilot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  autopilot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          pip install pillow numpy requests supabase

      - name: Generate and Upload 1 Reel
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          echo "Starting 6-Hourly Autopilot Job..."
          python3 autoreel.py --add-audio audio --output "temp_reel.mp4"
          REAL_FILE=$(ls *temp_reel*_audio.mp4 | head -n 1)
          if [ -f "$REAL_FILE" ]; then
              echo "[+] Found video: $REAL_FILE"
              export LOCAL_REEL="$REAL_FILE"
              python3 run_upload.py
          else
              echo "[!] No video file found to upload."
              ls -R
              exit 1
          fi
          echo "Autopilot cycle finished."