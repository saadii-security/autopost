name: Hourly Reel Autopilot

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:      # Allows manual trigger

jobs:
  autopilot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          pip install pillow numpy requests supabase

      - name: Generate and Upload 5 Reels
        env:
          # You need to set these in GitHub Repo Settings -> Secrets and variables -> Actions
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          # 1. Update the credentials in scripts using env vars
          # (A better way is using os.getenv in the scripts, which I've done below)
          
          echo "Starting Hourly Autopilot Job..."
          
          # 2. Run the process 5 times
          for i in {1..5}; do
            echo "--- Processing Reel $i/5 ---"
            
            # Generate local reel (outputs a random one with audio)
            python3 autoreel.py --add-audio audio --output "temp_reel_$i.mp4"
            
            # Since my autoreel.py appends _audio.mp4, find the actual file
            REAL_FILE=$(ls temp_reel_${i}*_audio.mp4 | head -n 1)
            
            if [ -f "$REAL_FILE" ]; then
                # Upload to Supabase and get Public URL
                export LOCAL_REEL="$REAL_FILE"
                python3 -c "
import os
from supabase_helper import upload_to_supabase
from upload_ig import upload_reel
from autoreel import get_random_caption

# Update config with env vars
import upload_ig
upload_ig.ACCESS_TOKEN = os.getenv('INSTAGRAM_ACCESS_TOKEN')
upload_ig.IG_USER_ID = os.getenv('INSTAGRAM_USER_ID')

local_file = os.getenv('LOCAL_REEL')
caption = get_random_caption('captions.txt')
print(f'[*] Using caption:\n{caption}')

public_url = upload_to_supabase(local_file)
if public_url:
    upload_reel(public_url, caption)
    # Cleanup Supabase
    from supabase_helper import delete_from_supabase
    delete_from_supabase(os.path.basename(local_file))
"
            fi
            
            # Small delay between uploads
            sleep 30
          done
          
          echo "Autopilot cycle finished."
